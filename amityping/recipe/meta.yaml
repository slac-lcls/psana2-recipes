{% set name = "amityping" %}
{% set version = "1.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/slac-lcls/{{ name }}/archive/{{ version }}.tar.gz
  sha256: 103612e2c7be3ad93af3efaa716ac41d3f11a3e8172caf848881dbf77d444fb1

build:
  skip: True  # [win]
  noarch: python 
  number: 10
  script:
    - "{{ PYTHON }} -m pip install . -vv"

requirements:
  host:
    - python
    - setuptools
    - pip
  run:
    - python
    - numpy
    - mypy_extensions

about:
  home: https://github.com/slac-lcls/amityping
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE.md
  summary: 'Type hints for LCLS-II software'
  description: |
    provides typing hints to be shared between LCLS-II analysis packages.
  doc_url: https://github.com/slac-lcls/amityping
  dev_url: https://github.com/slac-lcls/amityping

extra:
  recipe-maintainers:
    - valmar
